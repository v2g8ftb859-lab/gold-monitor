<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <meta name="theme-color" content="#ff6b6b">
  <title>🔥 吵架/怼人助手</title>
  <style>
    /* ==================== 基础重置 ==================== */
    * { margin: 0; padding: 0; box-sizing: border-box; }

    :root {
      --primary: #ff6b6b;
      --primary-light: #ff8e8e;
      --primary-dark: #e55555;
      --bg-primary: #0f0f14;
      --bg-secondary: #16161d;
      --bg-card: #1e1e28;
      --bg-card-hover: #262633;
      --text-primary: #f0f0f5;
      --text-secondary: #a0a0b8;
      --text-muted: #6b6b80;
      --border: #2a2a3a;
      --accent-yellow: #ffd93d;
      --accent-green: #6bcb77;
      --accent-blue: #4d96ff;
      --accent-purple: #9b59b6;
      --shadow: 0 8px 32px rgba(0,0,0,0.4);
      --glow-red: 0 0 20px rgba(255,107,107,0.3);
    }

    body {
      font-family: -apple-system, BlinkMacSystemFont, 'SF Pro Display', 'PingFang SC', 'Noto Sans SC', 'Microsoft YaHei', sans-serif;
      background: var(--bg-primary);
      color: var(--text-primary);
      min-height: 100vh;
      overflow-x: hidden;
      -webkit-font-smoothing: antialiased;
    }

    /* ==================== 背景动画 ==================== */
    .bg-effects {
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      pointer-events: none;
      z-index: 0;
      overflow: hidden;
    }

    .bg-effects::before {
      content: '';
      position: absolute;
      top: -50%;
      left: -50%;
      width: 200%;
      height: 200%;
      background: radial-gradient(ellipse at 30% 20%, rgba(255,107,107,0.08) 0%, transparent 50%),
                  radial-gradient(ellipse at 70% 80%, rgba(155,89,182,0.06) 0%, transparent 50%);
      animation: bgFloat 20s ease-in-out infinite;
    }

    @keyframes bgFloat {
      0%, 100% { transform: translate(0, 0) rotate(0deg); }
      33% { transform: translate(30px, -30px) rotate(2deg); }
      66% { transform: translate(-20px, 20px) rotate(-1deg); }
    }

    /* ==================== 布局 ==================== */
    .app {
      max-width: 520px;
      margin: 0 auto;
      padding: 0 16px 60px;
      position: relative;
      z-index: 1;
    }

    /* ==================== 顶部 ==================== */
    .header {
      text-align: center;
      padding: 40px 0 24px;
    }

    .logo {
      font-size: 64px;
      margin-bottom: 12px;
      animation: logoShake 3s ease-in-out infinite;
      display: inline-block;
    }

    @keyframes logoShake {
      0%, 100% { transform: rotate(0deg); }
      10% { transform: rotate(-10deg); }
      20% { transform: rotate(10deg); }
      30% { transform: rotate(-5deg); }
      40% { transform: rotate(5deg); }
      50% { transform: rotate(0deg); }
    }

    .header h1 {
      font-size: 28px;
      font-weight: 800;
      background: linear-gradient(135deg, var(--primary), var(--accent-purple));
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
      margin-bottom: 8px;
    }

    .header .subtitle {
      font-size: 14px;
      color: var(--text-muted);
      line-height: 1.6;
    }

    /* ==================== 输入区域 ==================== */
    .input-section {
      margin-top: 24px;
    }

    .input-card {
      background: var(--bg-card);
      border: 1px solid var(--border);
      border-radius: 20px;
      padding: 24px;
      position: relative;
      transition: border-color 0.3s, box-shadow 0.3s;
    }

    .input-card:focus-within {
      border-color: var(--primary);
      box-shadow: var(--glow-red);
    }

    .input-label {
      display: flex;
      align-items: center;
      gap: 8px;
      font-size: 15px;
      font-weight: 700;
      margin-bottom: 14px;
      color: var(--text-secondary);
    }

    .input-label .emoji {
      font-size: 20px;
    }

    .input-textarea {
      width: 100%;
      min-height: 100px;
      background: var(--bg-primary);
      border: 1px solid var(--border);
      border-radius: 14px;
      padding: 16px;
      color: var(--text-primary);
      font-size: 16px;
      line-height: 1.6;
      resize: none;
      outline: none;
      font-family: inherit;
      transition: border-color 0.3s;
    }

    .input-textarea:focus {
      border-color: rgba(255,107,107,0.5);
    }

    .input-textarea::placeholder {
      color: var(--text-muted);
      font-size: 14px;
    }

    .char-count {
      text-align: right;
      font-size: 12px;
      color: var(--text-muted);
      margin-top: 8px;
    }

    /* ==================== 风格选择 ==================== */
    .style-section {
      margin-top: 20px;
    }

    .style-label {
      display: flex;
      align-items: center;
      gap: 8px;
      font-size: 15px;
      font-weight: 700;
      margin-bottom: 14px;
      color: var(--text-secondary);
    }

    .style-grid {
      display: grid;
      grid-template-columns: repeat(2, 1fr);
      gap: 12px;
    }

    .style-card {
      background: var(--bg-card);
      border: 2px solid var(--border);
      border-radius: 16px;
      padding: 18px 14px;
      text-align: center;
      cursor: pointer;
      transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
      position: relative;
      overflow: hidden;
    }

    .style-card::before {
      content: '';
      position: absolute;
      top: 0;
      left: 0;
      right: 0;
      bottom: 0;
      opacity: 0;
      transition: opacity 0.3s;
      border-radius: 14px;
    }

    .style-card:hover {
      transform: translateY(-2px);
      border-color: var(--text-muted);
    }

    .style-card.selected {
      transform: translateY(-2px);
      box-shadow: 0 4px 20px rgba(0,0,0,0.3);
    }

    .style-card[data-style="elegant"].selected {
      border-color: var(--accent-green);
      background: linear-gradient(135deg, rgba(107,203,119,0.15), rgba(107,203,119,0.05));
    }
    .style-card[data-style="crazy"].selected {
      border-color: var(--primary);
      background: linear-gradient(135deg, rgba(255,107,107,0.15), rgba(255,107,107,0.05));
    }
    .style-card[data-style="sarcastic"].selected {
      border-color: var(--accent-yellow);
      background: linear-gradient(135deg, rgba(255,217,61,0.15), rgba(255,217,61,0.05));
    }
    .style-card[data-style="logic"].selected {
      border-color: var(--accent-blue);
      background: linear-gradient(135deg, rgba(77,150,255,0.15), rgba(77,150,255,0.05));
    }

    .style-icon {
      font-size: 36px;
      margin-bottom: 8px;
      display: block;
    }

    .style-name {
      font-size: 15px;
      font-weight: 700;
      margin-bottom: 4px;
    }

    .style-desc {
      font-size: 11px;
      color: var(--text-muted);
      line-height: 1.4;
    }

    .style-check {
      position: absolute;
      top: 10px;
      right: 10px;
      width: 22px;
      height: 22px;
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 12px;
      opacity: 0;
      transform: scale(0.5);
      transition: all 0.3s;
    }

    .style-card.selected .style-check {
      opacity: 1;
      transform: scale(1);
    }

    .style-card[data-style="elegant"] .style-check { background: var(--accent-green); }
    .style-card[data-style="crazy"] .style-check { background: var(--primary); }
    .style-card[data-style="sarcastic"] .style-check { background: var(--accent-yellow); }
    .style-card[data-style="logic"] .style-check { background: var(--accent-blue); }

    /* ==================== 生成按钮 ==================== */
    .generate-btn {
      width: 100%;
      margin-top: 24px;
      padding: 18px;
      border: none;
      border-radius: 16px;
      font-size: 17px;
      font-weight: 800;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 10px;
      transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
      background: linear-gradient(135deg, var(--primary), var(--accent-purple));
      color: white;
      position: relative;
      overflow: hidden;
    }

    .generate-btn::before {
      content: '';
      position: absolute;
      top: 0;
      left: -100%;
      width: 100%;
      height: 100%;
      background: linear-gradient(90deg, transparent, rgba(255,255,255,0.15), transparent);
      transition: left 0.5s;
    }

    .generate-btn:hover::before {
      left: 100%;
    }

    .generate-btn:hover {
      transform: translateY(-2px);
      box-shadow: 0 8px 30px rgba(255,107,107,0.4);
    }

    .generate-btn:active {
      transform: scale(0.98);
    }

    .generate-btn:disabled {
      opacity: 0.6;
      cursor: not-allowed;
      transform: none;
    }

    .generate-btn:disabled:hover {
      box-shadow: none;
    }

    .generate-btn:disabled::before {
      display: none;
    }

    /* ==================== 加载动画 ==================== */
    .loading-section {
      display: none;
      text-align: center;
      padding: 40px 0;
    }

    .loading-section.show {
      display: block;
    }

    .loading-emoji {
      font-size: 48px;
      animation: loadingBounce 0.8s ease-in-out infinite;
    }

    @keyframes loadingBounce {
      0%, 100% { transform: translateY(0) rotate(0deg); }
      50% { transform: translateY(-20px) rotate(10deg); }
    }

    .loading-text {
      margin-top: 16px;
      font-size: 15px;
      color: var(--text-secondary);
      animation: loadingPulse 1.5s ease-in-out infinite;
    }

    @keyframes loadingPulse {
      0%, 100% { opacity: 1; }
      50% { opacity: 0.5; }
    }

    .loading-dots::after {
      content: '';
      animation: dots 1.5s steps(4, end) infinite;
    }

    @keyframes dots {
      0% { content: ''; }
      25% { content: '.'; }
      50% { content: '..'; }
      75% { content: '...'; }
    }

    /* ==================== 结果区域 ==================== */
    .result-section {
      display: none;
      margin-top: 28px;
    }

    .result-section.show {
      display: block;
      animation: fadeInUp 0.5s ease;
    }

    @keyframes fadeInUp {
      from { opacity: 0; transform: translateY(20px); }
      to { opacity: 1; transform: translateY(0); }
    }

    .result-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-bottom: 16px;
    }

    .result-title {
      font-size: 18px;
      font-weight: 800;
      display: flex;
      align-items: center;
      gap: 8px;
    }

    .result-badge {
      font-size: 12px;
      padding: 4px 10px;
      border-radius: 20px;
      font-weight: 600;
    }

    .result-badge[data-style="elegant"] { background: rgba(107,203,119,0.2); color: var(--accent-green); }
    .result-badge[data-style="crazy"] { background: rgba(255,107,107,0.2); color: var(--primary); }
    .result-badge[data-style="sarcastic"] { background: rgba(255,217,61,0.2); color: var(--accent-yellow); }
    .result-badge[data-style="logic"] { background: rgba(77,150,255,0.2); color: var(--accent-blue); }

    /* 原话引用 */
    .original-quote {
      background: rgba(255,255,255,0.03);
      border-left: 3px solid var(--text-muted);
      border-radius: 0 12px 12px 0;
      padding: 12px 16px;
      margin-bottom: 16px;
      font-size: 14px;
      color: var(--text-muted);
      font-style: italic;
    }

    .original-quote::before {
      content: '对方说：';
      font-style: normal;
      font-weight: 600;
      color: var(--text-secondary);
    }

    /* 回复卡片 */
    .reply-card {
      background: var(--bg-card);
      border: 1px solid var(--border);
      border-radius: 18px;
      padding: 20px;
      margin-bottom: 14px;
      position: relative;
      transition: all 0.3s;
      animation: replySlideIn 0.5s ease forwards;
      opacity: 0;
    }

    .reply-card:nth-child(1) { animation-delay: 0.1s; }
    .reply-card:nth-child(2) { animation-delay: 0.3s; }
    .reply-card:nth-child(3) { animation-delay: 0.5s; }

    @keyframes replySlideIn {
      from { opacity: 0; transform: translateX(-20px); }
      to { opacity: 1; transform: translateX(0); }
    }

    .reply-card:hover {
      border-color: var(--primary);
      transform: translateX(4px);
      box-shadow: 0 4px 20px rgba(0,0,0,0.2);
    }

    .reply-number {
      position: absolute;
      top: -10px;
      left: 16px;
      width: 28px;
      height: 28px;
      border-radius: 50%;
      background: linear-gradient(135deg, var(--primary), var(--accent-purple));
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 13px;
      font-weight: 800;
      color: white;
    }

    .reply-text {
      font-size: 16px;
      line-height: 1.8;
      margin-bottom: 14px;
      padding-top: 6px;
      word-break: break-word;
    }

    .reply-actions {
      display: flex;
      gap: 8px;
    }

    .reply-btn {
      padding: 8px 14px;
      border-radius: 10px;
      border: 1px solid var(--border);
      background: var(--bg-primary);
      color: var(--text-secondary);
      font-size: 13px;
      cursor: pointer;
      display: flex;
      align-items: center;
      gap: 6px;
      transition: all 0.2s;
      font-family: inherit;
    }

    .reply-btn:hover {
      background: var(--bg-card-hover);
      color: var(--text-primary);
      border-color: var(--text-muted);
    }

    .reply-btn.copied {
      background: rgba(107,203,119,0.15);
      border-color: var(--accent-green);
      color: var(--accent-green);
    }

    /* ==================== 示例快捷入口 ==================== */
    .examples-section {
      margin-top: 28px;
    }

    .examples-title {
      font-size: 14px;
      color: var(--text-muted);
      margin-bottom: 12px;
      display: flex;
      align-items: center;
      gap: 6px;
    }

    .examples-grid {
      display: flex;
      flex-wrap: wrap;
      gap: 8px;
    }

    .example-chip {
      padding: 8px 14px;
      border-radius: 20px;
      background: var(--bg-card);
      border: 1px solid var(--border);
      color: var(--text-secondary);
      font-size: 13px;
      cursor: pointer;
      transition: all 0.2s;
      white-space: nowrap;
    }

    .example-chip:hover {
      background: var(--bg-card-hover);
      border-color: var(--primary);
      color: var(--text-primary);
      transform: translateY(-1px);
    }

    /* ==================== Toast ==================== */
    .toast {
      position: fixed;
      bottom: 30px;
      left: 50%;
      transform: translateX(-50%) translateY(100px);
      background: var(--bg-card);
      border: 1px solid var(--border);
      border-radius: 14px;
      padding: 14px 24px;
      font-size: 14px;
      z-index: 1000;
      transition: transform 0.3s cubic-bezier(0.4, 0, 0.2, 1);
      box-shadow: var(--shadow);
      display: flex;
      align-items: center;
      gap: 8px;
    }

    .toast.show {
      transform: translateX(-50%) translateY(0);
    }

    /* ==================== Footer ==================== */
    .footer {
      text-align: center;
      padding: 32px 0;
      font-size: 12px;
      color: var(--text-muted);
      line-height: 1.8;
    }

    .footer a {
      color: var(--primary);
      text-decoration: none;
    }

    /* ==================== 响应式 ==================== */
    @media (max-width: 380px) {
      .style-grid {
        grid-template-columns: repeat(2, 1fr);
        gap: 8px;
      }
      .style-card { padding: 14px 10px; }
      .style-icon { font-size: 28px; }
      .style-name { font-size: 13px; }
      .header h1 { font-size: 24px; }
    }

    @media (min-width: 768px) {
      .app { max-width: 560px; }
    }

    /* ==================== 自定义滚动条 ==================== */
    ::-webkit-scrollbar { width: 4px; }
    ::-webkit-scrollbar-track { background: transparent; }
    ::-webkit-scrollbar-thumb { background: var(--border); border-radius: 2px; }
    ::-webkit-scrollbar-thumb:hover { background: var(--text-muted); }
  </style>
</head>
<body>
  <div class="bg-effects"></div>

  <div class="app">
    <!-- 顶部 -->
    <header class="header">
      <div class="logo">🔥</div>
      <h1>吵架 / 怼人助手</h1>
      <p class="subtitle">输入对方的无理之言，选择回怼风格<br>AI 秒生 3 条神回复，让你永远不词穷！</p>
    </header>

    <!-- 输入区域 -->
    <div class="input-section">
      <div class="input-card">
        <div class="input-label">
          <span class="emoji">💬</span>
          <span>对方说了什么？</span>
        </div>
        <textarea class="input-textarea" id="inputText" placeholder="输入对方的无理之言...&#10;&#10;例如：你怎么还没结婚？" maxlength="200"></textarea>
        <div class="char-count"><span id="charCount">0</span>/200</div>
      </div>
    </div>

    <!-- 风格选择 -->
    <div class="style-section">
      <div class="style-label">
        <span class="emoji">🎭</span>
        <span>选择回怼风格</span>
      </div>
      <div class="style-grid">
        <div class="style-card selected" data-style="elegant">
          <div class="style-check">✓</div>
          <span class="style-icon">🎩</span>
          <div class="style-name">高情商回怼</div>
          <div class="style-desc">优雅反击，让对方哑口无言</div>
        </div>
        <div class="style-card" data-style="crazy">
          <div class="style-check">✓</div>
          <span class="style-icon">🤪</span>
          <div class="style-name">发疯文学</div>
          <div class="style-desc">疯狂输出，让对方精神错乱</div>
        </div>
        <div class="style-card" data-style="sarcastic">
          <div class="style-check">✓</div>
          <span class="style-icon">😏</span>
          <div class="style-name">阴阳怪气</div>
          <div class="style-desc">绵里藏针，笑着把人怼死</div>
        </div>
        <div class="style-card" data-style="logic">
          <div class="style-check">✓</div>
          <span class="style-icon">🧠</span>
          <div class="style-name">逻辑鬼才</div>
          <div class="style-desc">层层递进，用道理碾压对方</div>
        </div>
      </div>
    </div>

    <!-- 生成按钮 -->
    <button class="generate-btn" id="generateBtn">
      <span>⚡</span>
      <span>生成神回复</span>
    </button>

    <!-- 加载动画 -->
    <div class="loading-section" id="loadingSection">
      <div class="loading-emoji">🤔</div>
      <div class="loading-text">
        AI 正在构思绝妙回复<span class="loading-dots"></span>
      </div>
    </div>

    <!-- 结果区域 -->
    <div class="result-section" id="resultSection">
      <div class="result-header">
        <div class="result-title">
          <span>💥</span>
          <span>神回复来了</span>
        </div>
        <span class="result-badge" id="resultBadge">高情商回怼</span>
      </div>
      <div class="original-quote" id="originalQuote"></div>
      <div id="repliesList"></div>
    </div>

    <!-- 示例快捷入口 -->
    <div class="examples-section">
      <div class="examples-title">
        <span>💡</span>
        <span>试试这些经典场景</span>
      </div>
      <div class="examples-grid">
        <div class="example-chip" data-text="你怎么还没结婚？">催婚</div>
        <div class="example-chip" data-text="你一个月挣多少钱？">问工资</div>
        <div class="example-chip" data-text="你怎么又胖了？">说你胖</div>
        <div class="example-chip" data-text="你学的那个专业能找到工作吗？">贬专业</div>
        <div class="example-chip" data-text="你看看别人家的孩子">比较</div>
        <div class="example-chip" data-text="女孩子读那么多书有什么用？">性别歧视</div>
        <div class="example-chip" data-text="你这个年纪了还玩游戏？">说你幼稚</div>
        <div class="example-chip" data-text="你怎么还不考公务员？">催考公</div>
        <div class="example-chip" data-text="你这工作不稳定吧？">贬工作</div>
        <div class="example-chip" data-text="就你这样还想买房？">嘲讽</div>
      </div>
    </div>

    <!-- Footer -->
    <div class="footer">
      <p>🔥 吵架助手 — 让你永远不词穷</p>
      <p>仅供娱乐，生活中请友善沟通 ❤️</p>
    </div>
  </div>

  <!-- Toast -->
  <div class="toast" id="toast"></div>

  <script>
    // ==================== 状态管理 ====================
    let selectedStyle = 'elegant';
    const inputText = document.getElementById('inputText');
    const charCount = document.getElementById('charCount');
    const generateBtn = document.getElementById('generateBtn');
    const loadingSection = document.getElementById('loadingSection');
    const resultSection = document.getElementById('resultSection');
    const resultBadge = document.getElementById('resultBadge');
    const originalQuote = document.getElementById('originalQuote');
    const repliesList = document.getElementById('repliesList');

    const styleNames = {
      elegant: '高情商回怼',
      crazy: '发疯文学',
      sarcastic: '阴阳怪气',
      logic: '逻辑鬼才'
    };

    const loadingEmojis = ['🤔', '😤', '🔥', '💪', '⚡', '🧨'];
    const loadingTexts = [
      'AI 正在构思绝妙回复',
      '正在组装语言核弹',
      '正在精心打磨每个字',
      '正在调配毒舌浓度',
      '灵感爆发中'
    ];

    // ==================== 字符计数 ====================
    inputText.addEventListener('input', () => {
      charCount.textContent = inputText.value.length;
    });

    // ==================== 风格选择 ====================
    document.querySelectorAll('.style-card').forEach(card => {
      card.addEventListener('click', () => {
        document.querySelectorAll('.style-card').forEach(c => c.classList.remove('selected'));
        card.classList.add('selected');
        selectedStyle = card.dataset.style;
      });
    });

    // ==================== 示例快捷入口 ====================
    document.querySelectorAll('.example-chip').forEach(chip => {
      chip.addEventListener('click', () => {
        inputText.value = chip.dataset.text;
        charCount.textContent = chip.dataset.text.length;
        inputText.focus();
        // 触发一次视觉反馈
        inputText.parentElement.style.borderColor = 'var(--primary)';
        inputText.parentElement.style.boxShadow = 'var(--glow-red)';
        setTimeout(() => {
          inputText.parentElement.style.borderColor = '';
          inputText.parentElement.style.boxShadow = '';
        }, 500);
      });
    });

    // ==================== 生成回复 ====================
    generateBtn.addEventListener('click', async () => {
      const text = inputText.value.trim();
      if (!text) {
        showToast('😅 先输入对方说的话吧~');
        inputText.focus();
        return;
      }

      generateBtn.disabled = true;
      resultSection.classList.remove('show');
      loadingSection.classList.add('show');

      // 随机切换 loading 动画
      const loadingEmoji = document.querySelector('.loading-emoji');
      const loadingTextEl = document.querySelector('.loading-text');
      let loadingIdx = 0;
      const loadingTimer = setInterval(() => {
        loadingIdx = (loadingIdx + 1) % loadingEmojis.length;
        loadingEmoji.textContent = loadingEmojis[loadingIdx];
        loadingTextEl.innerHTML = loadingTexts[loadingIdx % loadingTexts.length] + '<span class="loading-dots"></span>';
      }, 800);

      try {
        const res = await fetch('/api/roast', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ text, style: selectedStyle })
        });

        const data = await res.json();

        clearInterval(loadingTimer);
        loadingSection.classList.remove('show');

        if (data.replies && data.replies.length > 0) {
          showResults(text, data.replies, selectedStyle);
        } else {
          showToast('😵 生成失败了，再试一次吧');
        }
      } catch (e) {
        clearInterval(loadingTimer);
        loadingSection.classList.remove('show');
        showToast('❌ 网络错误，请重试');
        console.error(e);
      } finally {
        generateBtn.disabled = false;
      }
    });

    // ==================== 展示结果 ====================
    function showResults(original, replies, style) {
      originalQuote.textContent = original;
      resultBadge.textContent = styleNames[style];
      resultBadge.setAttribute('data-style', style);

      repliesList.innerHTML = replies.map((reply, i) => `
        <div class="reply-card">
          <div class="reply-number">${i + 1}</div>
          <div class="reply-text">${escapeHtml(reply)}</div>
          <div class="reply-actions">
            <button class="reply-btn" onclick="copyReply(this, '${escapeForAttr(reply)}')">
              📋 复制
            </button>
            <button class="reply-btn" onclick="shareReply('${escapeForAttr(reply)}')">
              🔗 分享
            </button>
          </div>
        </div>
      `).join('');

      resultSection.classList.add('show');

      // 滚动到结果区域
      setTimeout(() => {
        resultSection.scrollIntoView({ behavior: 'smooth', block: 'start' });
      }, 200);
    }

    // ==================== 复制 ====================
    function copyReply(btn, text) {
      navigator.clipboard.writeText(text).then(() => {
        btn.classList.add('copied');
        btn.innerHTML = '✅ 已复制';
        showToast('📋 已复制到剪贴板，去怼他！');
        setTimeout(() => {
          btn.classList.remove('copied');
          btn.innerHTML = '📋 复制';
        }, 2000);
      }).catch(() => {
        // 降级方案
        const ta = document.createElement('textarea');
        ta.value = text;
        document.body.appendChild(ta);
        ta.select();
        document.execCommand('copy');
        document.body.removeChild(ta);
        btn.classList.add('copied');
        btn.innerHTML = '✅ 已复制';
        showToast('📋 已复制到剪贴板');
        setTimeout(() => {
          btn.classList.remove('copied');
          btn.innerHTML = '📋 复制';
        }, 2000);
      });
    }

    // ==================== 分享 ====================
    function shareReply(text) {
      if (navigator.share) {
        navigator.share({
          title: '🔥 吵架助手 · 神回复',
          text: text
        }).catch(() => {});
      } else {
        copyReply(event.target, text);
      }
    }

    // ==================== 工具函数 ====================
    function escapeHtml(str) {
      const div = document.createElement('div');
      div.textContent = str;
      return div.innerHTML;
    }

    function escapeForAttr(str) {
      return str.replace(/\\/g, '\\\\').replace(/'/g, "\\'").replace(/"/g, '&quot;').replace(/\n/g, '\\n');
    }

    function showToast(message) {
      const toast = document.getElementById('toast');
      toast.textContent = message;
      toast.classList.add('show');
      setTimeout(() => toast.classList.remove('show'), 3000);
    }

    // ==================== 快捷键 ====================
    inputText.addEventListener('keydown', (e) => {
      if ((e.metaKey || e.ctrlKey) && e.key === 'Enter') {
        generateBtn.click();
      }
    });
  </script>
</body>
</html>
